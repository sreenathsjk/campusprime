<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Campus Prime — Admin Login</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
  import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDIFLO7rwIJbJnAt2EV7m57ydkPfH9FQzA",
    authDomain: "campus-prime.firebaseapp.com",
    projectId: "campus-prime",
    storageBucket: "campus-prime.firebasestorage.app",
    messagingSenderId: "934780803109",
    appId: "1:934780803109:web:678a903369166ce72f07cc"
  };

  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db   = getFirestore(app);

  // Route user to correct dashboard based on role
  async function routeByRole(user) {
    try {
      const q = query(collection(db, 'users'), where('uid', '==', user.uid));
      const snap = await getDocs(q);
      if (!snap.empty) {
        const userData = snap.docs[0].data();
        const role = userData.role || 'school_admin';
        // Store role in sessionStorage for dashboard use
        sessionStorage.setItem('cp_uid', user.uid);
        sessionStorage.setItem('cp_email', user.email);
        sessionStorage.setItem('cp_role', role);
        sessionStorage.setItem('cp_name', userData.displayName || user.email);
        if (userData.schoolId) sessionStorage.setItem('cp_schoolId', userData.schoolId);
        if (userData.schoolName) sessionStorage.setItem('cp_schoolName', userData.schoolName);

        // Route to correct dashboard
        if (role === 'super_admin') {
          window.location.href = 'index.html';
        } else if (role === 'teacher') {
          window.location.href = '../teacher/dashboard.html';
        } else if (role === 'student') {
          window.location.href = '../student/dashboard.html';
        } else {
          // school_admin → admin dashboard
          window.location.href = 'index.html';
        }
      } else {
        // No user doc — check if super admin by email
        sessionStorage.setItem('cp_uid', user.uid);
        sessionStorage.setItem('cp_email', user.email);
        sessionStorage.setItem('cp_role', 'super_admin');
        window.location.href = 'index.html';
      }
    } catch (err) {
      console.error('Role routing error:', err);
      window.location.href = 'index.html';
    }
  }

  // If already logged in → route immediately
  onAuthStateChanged(auth, (user) => {
    if (user && sessionStorage.getItem('cp_role')) {
      const role = sessionStorage.getItem('cp_role');
      if (role === 'teacher') window.location.href = '../teacher/dashboard.html';
      else if (role === 'student') window.location.href = '../student/dashboard.html';
      else window.location.href = 'index.html';
    }
  });

  // Handle login form
  window.handleLogin = async (e) => {
    e.preventDefault();
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn      = document.getElementById('loginBtn');
    const errorEl  = document.getElementById('errorMsg');

    btn.classList.add('loading');
    errorEl.style.display = 'none';

    try {
      const cred = await signInWithEmailAndPassword(auth, email, password);
      await routeByRole(cred.user);
    } catch (err) {
      btn.classList.remove('loading');
      let msg = 'Login failed. Please try again.';
      if (err.code === 'auth/user-not-found' || err.code === 'auth/wrong-password' || err.code === 'auth/invalid-credential') {
        msg = 'Invalid email or password.';
      } else if (err.code === 'auth/too-many-requests') {
        msg = 'Too many attempts. Please try again later.';
      } else if (err.code === 'auth/invalid-email') {
        msg = 'Please enter a valid email address.';
      } else {
        msg = err.message || msg;
      }
      errorEl.textContent = '⚠️ ' + msg;
      errorEl.style.display = 'block';
    }
  };

  window.togglePass = () => {
    const inp = document.getElementById('password');
    inp.type = inp.type === 'password' ? 'text' : 'password';
  };
</script>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --blue: #2563eb; --grad: linear-gradient(135deg,#2563eb,#06b6d4);
    --text: #1e293b; --text-muted: #64748b;
    --border: #e2e8f0; --bg: #f1f5fd; --danger: #ef4444;
  }
  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg); min-height: 100vh;
    -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
    background: radial-gradient(ellipse 80% 60% at 30% 20%, rgba(37,99,235,0.08) 0%, transparent 60%),
                radial-gradient(ellipse 60% 50% at 80% 80%, rgba(6,182,212,0.06) 0%, transparent 60%), #f1f5fd;
  }
  .wrap { width: 100%; max-width: 420px; }
  .logo {
    display: flex; align-items: center; justify-content: center;
    gap: 10px; margin-bottom: 32px; text-decoration: none;
  }
  .logo-mark {
    width: 44px; height: 44px; background: var(--grad);
    border-radius: 12px; display: flex; align-items: center;
    justify-content: center; color: white;
    font-family: 'Inter', sans-serif; font-weight: 800; font-size: 1.3rem;
  }
  .logo-text { font-family: 'Inter', sans-serif; font-weight: 800; font-size: 1.4rem; color: #0d1526; }
  .logo-text span { color: var(--blue); }
  .card {
    background: white; border-radius: 20px;
    padding: 36px 32px; border: 1px solid var(--border);
    box-shadow: 0 4px 24px rgba(0,0,0,0.07);
  }
  .badge {
    display: inline-flex; align-items: center; gap: 6px;
    background: rgba(37,99,235,0.08); border: 1px solid rgba(37,99,235,0.2);
    border-radius: 100px; padding: 5px 14px;
    font-size: 0.78rem; font-weight: 700; color: var(--blue); margin-bottom: 16px;
  }
  .bdot { width: 6px; height: 6px; background: var(--blue); border-radius: 50%; }
  h1 { font-family: 'Inter', sans-serif; font-size: 1.7rem; font-weight: 800; color: var(--text); margin-bottom: 5px; }
  .sub { font-size: 0.87rem; color: var(--text-muted); margin-bottom: 28px; }
  .error {
    background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.25);
    border-radius: 10px; padding: 10px 14px;
    font-size: 0.83rem; color: var(--danger);
    margin-bottom: 18px; display: none;
  }
  .fg { margin-bottom: 18px; }
  label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text); margin-bottom: 7px; }
  .inp-wrap { position: relative; }
  .inp-icon { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); font-size: 1rem; pointer-events: none; }
  input[type=email], input[type=password], input[type=text] {
    width: 100%; padding: 12px 14px 12px 40px;
    border: 1.5px solid var(--border); border-radius: 12px;
    font-family: 'Inter', sans-serif; font-size: 0.92rem;
    color: var(--text); outline: none; background: #fafbff;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  input:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(37,99,235,0.08); background: white; }
  .eye { position: absolute; right: 13px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; font-size: 1rem; color: var(--text-muted); }
  .btn-login {
    width: 100%; padding: 14px; background: var(--grad);
    color: white; border: none; border-radius: 12px;
    font-family: 'Inter', sans-serif; font-size: 1rem; font-weight: 700;
    cursor: pointer; transition: all 0.25s;
    box-shadow: 0 4px 16px rgba(37,99,235,0.3);
    display: flex; align-items: center; justify-content: center; gap: 8px;
    margin-top: 8px;
  }
  .btn-login:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(37,99,235,0.4); }
  .btn-login.loading { opacity: 0.8; pointer-events: none; }
  .spinner { width: 18px; height: 18px; border: 2.5px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; display: none; }
  .btn-login.loading .spinner { display: block; }
  .btn-login.loading .btn-txt { display: none; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .role-tabs { display:flex; gap:4px; background:var(--bg); border-radius:12px; padding:4px; margin-bottom:20px; }
  .rtab { flex:1; padding:8px 4px; border:none; background:transparent; border-radius:8px; font-family:'Inter',sans-serif; font-size:0.75rem; font-weight:600; color:var(--text-muted); cursor:pointer; transition:all 0.2s; white-space:nowrap; }
  .rtab.active { background:white; color:var(--blue); box-shadow:0 2px 8px rgba(0,0,0,0.08); }
  .firebase-note {
    display: flex; align-items: center; gap: 8px;
    background: rgba(255,152,0,0.08); border: 1px solid rgba(255,152,0,0.2);
    border-radius: 10px; padding: 10px 14px;
    font-size: 0.78rem; color: #e65100; margin-top: 18px;
  }
  .back { text-align: center; margin-top: 20px; }
  .back a { color: var(--text-muted); font-size: 0.83rem; text-decoration: none; }
  .back a:hover { color: var(--blue); }
  .hint { font-size: 0.78rem; color: var(--text-muted); margin-top: 14px; text-align: center; }
</style>
</head>
<body>
<div class="wrap">
  <a href="../index.html" class="logo">
    <div class="logo-mark">C</div>
    <div class="logo-text">Campus<span>Prime</span></div>
  </a>

  <div class="card">
    <div class="badge"><span class="bdot"></span> Secure Sign In</div>
    <h1>Welcome back</h1>
    <p class="sub">Sign in to your Campus Prime account</p>

    <!-- Role selector -->
    <div class="role-tabs">
      <button class="rtab active" onclick="setRole('super_admin',this)">Super Admin</button>
      <button class="rtab" onclick="setRole('school_admin',this)">School Admin</button>
      <button class="rtab" onclick="setRole('teacher',this)">Teacher</button>
      <button class="rtab" onclick="setRole('student',this)">Student</button>
    </div>

    <div class="error" id="errorMsg"></div>

    <form onsubmit="handleLogin(event)">
      <div class="fg">
        <label>Email Address</label>
        <div class="inp-wrap">
          <span class="inp-icon">📧</span>
          <input type="email" id="email" placeholder="admin@campusprime.com" required autocomplete="email"/>
        </div>
      </div>
      <div class="fg">
        <label>Password</label>
        <div class="inp-wrap">
          <span class="inp-icon">🔒</span>
          <input type="password" id="password" placeholder="Your password" required/>
          <button type="button" class="eye" onclick="togglePass()">👁️</button>
        </div>
      </div>
      <button type="submit" class="btn-login" id="loginBtn">
        <div class="spinner"></div>
        <span class="btn-txt">Sign In to Dashboard →</span>
      </button>
    </form>

    <div class="firebase-note">
      🔥 Powered by Firebase Auth · campus-prime project
    </div>

    <p class="hint">
      First time? Register your school on the <a href="../index.html" style="color:var(--blue)">home page</a>
    </p>
  </div>

  <div class="back"><a href="../index.html">← Back to Campus Prime</a></div>
</div>
<script>
  let selectedRole = 'super_admin';
  function setRole(role, el) {
    selectedRole = role;
    document.querySelectorAll('.rtab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    const placeholders = {
      super_admin: 'admin@campusprime.com',
      school_admin: 'admin@yourschool.edu',
      teacher: 'teacher@yourschool.edu',
      student: 'student@yourschool.edu'
    };
    document.getElementById('email').placeholder = placeholders[role] || 'your@email.com';
  }
</script>
</body>
</html>
