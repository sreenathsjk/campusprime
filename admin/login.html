<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Campus Prime — Super Admin Login</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --blue: #2563eb;
    --blue-light: #3b82f6;
    --cyan: #06b6d4;
    --ink: #0d1526;
    --text: #1e293b;
    --text-muted: #64748b;
    --border: #e2e8f0;
    --bg: #f1f5fd;
    --grad: linear-gradient(135deg, #2563eb, #06b6d4);
    --danger: #ef4444;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    position: relative;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 20% 20%, rgba(37,99,235,0.08) 0%, transparent 60%),
      radial-gradient(ellipse 60% 50% at 80% 80%, rgba(6,182,212,0.06) 0%, transparent 60%);
    pointer-events: none;
  }

  .login-wrap {
    width: 100%; max-width: 420px;
    position: relative; z-index: 1;
  }

  .login-header {
    text-align: center; margin-bottom: 32px;
  }

  .logo {
    display: inline-flex; align-items: center; gap: 10px;
    text-decoration: none; margin-bottom: 28px;
  }

  .logo-mark {
    width: 44px; height: 44px;
    background: var(--grad);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    color: white; font-weight: 800; font-size: 1.3rem;
    font-family: 'Syne', sans-serif;
  }

  .logo-text {
    font-family: 'Syne', sans-serif;
    font-weight: 800; font-size: 1.4rem; color: var(--ink);
  }

  .logo-text span { color: var(--blue); }

  .login-card {
    background: white;
    border-radius: 20px;
    padding: 36px 32px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08), 0 1px 4px rgba(0,0,0,0.04);
    border: 1px solid var(--border);
  }

  .admin-badge {
    display: inline-flex; align-items: center; gap: 6px;
    background: rgba(37,99,235,0.08);
    border: 1px solid rgba(37,99,235,0.2);
    border-radius: 100px; padding: 5px 14px;
    font-size: 0.78rem; font-weight: 700; color: var(--blue);
    margin-bottom: 20px;
  }

  .badge-dot {
    width: 6px; height: 6px;
    background: var(--blue); border-radius: 50%;
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: 1.7rem; font-weight: 800;
    color: var(--ink); margin-bottom: 6px;
  }

  .subtitle {
    font-size: 0.88rem; color: var(--text-muted);
    margin-bottom: 28px;
  }

  .form-group {
    margin-bottom: 18px;
  }

  label {
    display: block;
    font-size: 0.82rem; font-weight: 600;
    color: var(--text); margin-bottom: 7px;
  }

  .input-wrap {
    position: relative;
  }

  .input-icon {
    position: absolute; left: 14px; top: 50%;
    transform: translateY(-50%);
    font-size: 1rem; pointer-events: none;
  }

  input {
    width: 100%; padding: 12px 14px 12px 42px;
    border: 1.5px solid var(--border);
    border-radius: 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.92rem; color: var(--text);
    outline: none; transition: border-color 0.2s, box-shadow 0.2s;
    background: #fafbff;
  }

  input:focus {
    border-color: var(--blue);
    box-shadow: 0 0 0 3px rgba(37,99,235,0.08);
    background: white;
  }

  .show-pass {
    position: absolute; right: 14px; top: 50%;
    transform: translateY(-50%);
    cursor: pointer; font-size: 1rem;
    color: var(--text-muted);
    background: none; border: none; padding: 0;
  }

  .error-msg {
    background: rgba(239,68,68,0.08);
    border: 1px solid rgba(239,68,68,0.2);
    border-radius: 10px; padding: 10px 14px;
    font-size: 0.83rem; color: var(--danger);
    margin-bottom: 18px; display: none;
    align-items: center; gap: 8px;
  }

  .error-msg.show { display: flex; }

  .btn-login {
    width: 100%; padding: 14px;
    background: var(--grad);
    color: white; border: none; border-radius: 12px;
    font-family: 'Syne', sans-serif;
    font-size: 1rem; font-weight: 700;
    cursor: pointer; transition: all 0.25s;
    box-shadow: 0 4px 16px rgba(37,99,235,0.3);
    display: flex; align-items: center; justify-content: center; gap: 8px;
    margin-top: 8px;
  }

  .btn-login:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(37,99,235,0.4);
  }

  .btn-login:active { transform: translateY(0); }

  .btn-login.loading { opacity: 0.8; pointer-events: none; }

  .spinner {
    width: 18px; height: 18px;
    border: 2.5px solid rgba(255,255,255,0.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: none;
  }

  .btn-login.loading .spinner { display: block; }
  .btn-login.loading .btn-text { display: none; }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .divider {
    display: flex; align-items: center; gap: 12px;
    margin: 22px 0; color: var(--text-muted); font-size: 0.8rem;
  }

  .divider::before, .divider::after {
    content: ''; flex: 1;
    height: 1px; background: var(--border);
  }

  .security-note {
    display: flex; align-items: center; gap: 8px;
    background: var(--bg); border-radius: 10px;
    padding: 12px 14px; margin-top: 20px;
    font-size: 0.78rem; color: var(--text-muted);
  }

  .back-link {
    text-align: center; margin-top: 20px;
  }

  .back-link a {
    color: var(--text-muted); font-size: 0.83rem;
    text-decoration: none; transition: color 0.2s;
  }

  .back-link a:hover { color: var(--blue); }
</style>
</head>
<body>

<div class="login-wrap">
  <div class="login-header">
    <a href="../index.html" class="logo">
      <div class="logo-mark">C</div>
      <div class="logo-text">Campus<span>Prime</span></div>
    </a>
  </div>

  <div class="login-card">
    <div class="admin-badge">
      <span class="badge-dot"></span>
      Super Admin Access
    </div>
    <h1>Welcome back</h1>
    <p class="subtitle">Sign in to manage your Campus Prime platform</p>

    <div class="error-msg" id="errorMsg">
      ⚠️ <span id="errorText">Invalid credentials. Please try again.</span>
    </div>

    <form onsubmit="handleLogin(event)">
      <div class="form-group">
        <label>Email Address</label>
        <div class="input-wrap">
          <span class="input-icon">📧</span>
          <input
            type="email"
            id="email"
            placeholder="admin@campusprime.com"
            required
            autocomplete="email"
          />
        </div>
      </div>

      <div class="form-group">
        <label>Password</label>
        <div class="input-wrap">
          <span class="input-icon">🔒</span>
          <input
            type="password"
            id="password"
            placeholder="Enter your password"
            required
            autocomplete="current-password"
          />
          <button type="button" class="show-pass" onclick="togglePass()">👁️</button>
        </div>
      </div>

      <button type="submit" class="btn-login" id="loginBtn">
        <div class="spinner"></div>
        <span class="btn-text">Sign In to Dashboard →</span>
      </button>
    </form>

    <div class="security-note">
      🔒 This is a restricted admin area. All access is logged and monitored.
    </div>
  </div>

  <div class="back-link">
    <a href="../index.html">← Back to Campus Prime</a>
  </div>
</div>

<script>
  // Demo credentials — in production these check against your backend API
  const ADMIN_EMAIL = 'admin@campusprime.com';
  const ADMIN_PASS = 'SuperAdmin@123!';

  function handleLogin(e) {
    e.preventDefault();
    const email = document.getElementById('email').value;
    const pass = document.getElementById('password').value;
    const btn = document.getElementById('loginBtn');
    const errorMsg = document.getElementById('errorMsg');

    // Show loading
    btn.classList.add('loading');
    errorMsg.classList.remove('show');

    setTimeout(() => {
      btn.classList.remove('loading');

      if (email === ADMIN_EMAIL && pass === ADMIN_PASS) {
        // Save session
        sessionStorage.setItem('admin_logged_in', 'true');
        sessionStorage.setItem('admin_email', email);
        // Redirect to dashboard
        window.location.href = 'index.html';
      } else {
        errorMsg.classList.add('show');
        document.getElementById('errorText').textContent =
          'Invalid email or password. Please try again.';
      }
    }, 1200);
  }

  function togglePass() {
    const input = document.getElementById('password');
    input.type = input.type === 'password' ? 'text' : 'password';
  }
</script>
</body>
</html>
